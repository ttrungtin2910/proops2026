# API SERVICE (mock)
# nginx giả lập API response — trả về JSON đơn giản
# Kiểm tra sau khi apply:
#   kubectl get pods -n ingress-lab -l app=api
#   kubectl get endpoints api-svc -n ingress-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-html
  namespace: ingress-lab
data:
  index.html: |
    {"service": "api", "path": "/api", "status": "ok"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ingress-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: app
        image: nginx:1.25.3
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: html
        configMap:
          name: api-html
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: ingress-lab
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 80          # container lắng nghe port 80, Service expose port 8080
