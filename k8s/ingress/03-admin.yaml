# ADMIN SERVICE
# Dùng cho host-based routing: admin.local → service này
# Kiểm tra sau khi apply:
#   kubectl get pods -n ingress-lab -l app=admin
#   kubectl get svc admin-svc -n ingress-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-html
  namespace: ingress-lab
data:
  index.html: |
    <h1>ADMIN PANEL</h1>
    <p>Bạn đang ở: admin.local</p>
    <p>Service: admin-svc</p>
    <p>Đây là host-based routing — subdomain khác → service khác</p>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: ingress-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: app
        image: nginx:1.25.3
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: html
        configMap:
          name: admin-html
---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
  namespace: ingress-lab
spec:
  selector:
    app: admin
  ports:
  - port: 80
    targetPort: 80
