# INGRESS — HOST-BASED ROUTING
#
# Luồng traffic:
#   app.local   → Ingress controller → frontend-svc → frontend Pod
#   admin.local → Ingress controller → admin-svc    → admin Pod
#
# Cùng một IP, cùng port 80, nhưng HTTP header "Host:" khác nhau
# → nginx đọc header → route đến đúng service
#
# Setup /etc/hosts (Windows: C:\Windows\System32\drivers\etc\hosts):
#   <minikube ip>  app.local
#   <minikube ip>  admin.local
#
# Lấy minikube IP:
#   minikube ip
#
# Test:
#   curl http://app.local           → trả về FRONTEND
#   curl http://admin.local         → trả về ADMIN PANEL
#   curl http://app.local/api       → 404 (không có rule /api trên host này)
#
# Hoặc không cần sửa hosts file:
#   MINIKUBE_IP=$(minikube ip)
#   curl -H "Host: app.local"   http://$MINIKUBE_IP   → FRONTEND
#   curl -H "Host: admin.local" http://$MINIKUBE_IP   → ADMIN PANEL
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: host-ingress
  namespace: ingress-lab
spec:
  ingressClassName: nginx
  rules:
  - host: frontend.local           # HTTP Host header phải là "frontend.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
  - host: admin.local             # HTTP Host header phải là "admin.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-svc
            port:
              number: 80
