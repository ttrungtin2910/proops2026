# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Deployment — qna-agent                                                ║
# ║  kubectl apply  -f qna-agent-deployment.yaml                           ║
# ║  kubectl rollout status deployment/qna-agent                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# APPLY ORDER — must satisfy before this file:
#   1. kubectl apply -f k8s/configmaps/qna-agent-cm.yaml
#   2. kubectl create secret generic qna-agent-secret --from-literal=...
#   If either is missing → Pod enters CreateContainerConfigError.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qna-agent
  namespace: default
  labels:
    app: qna-agent
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qna-agent
  template:
    metadata:
      labels:
        app: qna-agent
    spec:
      containers:
        - name: qna-agent
          image: ttrungtin2910/qna-agent:day10
          ports:
            - containerPort: 8000   # ← must match Service.spec.ports.targetPort

          # ── Config (non-sensitive) ────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: qna-agent-cm           # injects all 13 keys at once

          # ── Secrets (sensitive — one key per entry) ───────────────────────
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qna-agent-secret     # ← must match Secret metadata.name
                  key:  OPENAI_API_KEY

          # ── Resource requests ─────────────────────────────────────────────
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi

          # ── Health probe ──────────────────────────────────────────────────
          # GET /health → { "status": "ok", "service": "qna-agent" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30   # Python + FastAPI + LangGraph cold-start buffer
            periodSeconds:       10
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds:       5
            failureThreshold:    3

# ══════════════════════════════════════════════════════════════════════════════
# TROUBLESHOOTING
# ══════════════════════════════════════════════════════════════════════════════
#
# 1. Pod stuck in CreateContainerConfigError
#    → ConfigMap or Secret not found.
#    kubectl describe pod <pod> | grep -A5 Events
#
# 2. CrashLoopBackOff
#    → App crashed on startup (missing OPENAI_API_KEY, bad Kafka/Milvus address)
#    kubectl logs <pod> --previous   ← crashed container output
#    Error is almost always in the last 10 lines.
#
# 3. Env var wrong value after ConfigMap update
#    kubectl apply -f k8s/configmaps/qna-agent-cm.yaml
#    kubectl rollout restart deployment/qna-agent
# ──────────────────────────────────────────────────────────────────────────
