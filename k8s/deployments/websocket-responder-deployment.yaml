# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Deployment — websocket-responder                                      ║
# ║  kubectl apply  -f websocket-responder-deployment.yaml                 ║
# ║  kubectl rollout status deployment/websocket-responder                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# APPLY ORDER — must satisfy before this file:
#   1. kubectl apply -f k8s/configmaps/websocket-responder-cm.yaml
#   2. kubectl create secret generic websocket-responder-secret --from-literal=...
#   If either is missing → Pod enters CreateContainerConfigError.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-responder
  namespace: default
  labels:
    app: websocket-responder
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-responder
  template:
    metadata:
      labels:
        app: websocket-responder
    spec:
      containers:
        - name: websocket-responder
          image: 905418181527.dkr.ecr.ap-northeast-2.amazonaws.com/project-tin-websocket-responder:v1
          ports:
            - containerPort: 8085   # ← must match Service.spec.ports.targetPort

          # ── Config (non-sensitive) ────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: websocket-responder-cm  # injects all 3 keys at once

          # ── Secrets (sensitive — one key per entry) ───────────────────────
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: websocket-responder-secret  # ← must match Secret metadata.name
                  key:  JWT_SECRET

          # ── Resource requests ─────────────────────────────────────────────
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi

          # ── Health probe ──────────────────────────────────────────────────
          # GET /health → { "status": "ok", "service": "websocket-responder" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 20   # .NET 8 cold-start buffer
            periodSeconds:       10
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds:       5
            failureThreshold:    3

# ══════════════════════════════════════════════════════════════════════════════
# TROUBLESHOOTING
# ══════════════════════════════════════════════════════════════════════════════
#
# 1. Pod stuck in CreateContainerConfigError
#    → ConfigMap or Secret not found.
#    kubectl describe pod <pod> | grep -A5 Events
#
# 2. CrashLoopBackOff
#    → JWT_SECRET mismatch with hook-gateway-secret is the most common cause.
#      Both services must share the exact same JWT_SECRET value.
#    kubectl logs <pod> --previous
#
# 3. Env var wrong value after ConfigMap update
#    kubectl apply -f k8s/configmaps/websocket-responder-cm.yaml
#    kubectl rollout restart deployment/websocket-responder
# ──────────────────────────────────────────────────────────────────────────
