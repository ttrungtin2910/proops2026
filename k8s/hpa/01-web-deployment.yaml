# DEPLOYMENT — web
#
# Tại sao cần resources.requests.cpu:
#   HPA tính % CPU utilization = (actual cpu) / (requests.cpu)
#   Không có requests.cpu → HPA không có baseline → không scale được
#
# Liveness probe: K8s tự restart Pod nếu /healthz không trả về 200
# Readiness probe: Service chỉ route traffic đến Pod khi /healthz trả về 200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: hpa-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: nginx:1.25.3
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m       # baseline cho HPA tính %
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: hpa-lab
spec:
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
