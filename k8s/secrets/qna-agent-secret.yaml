# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Secret TEMPLATE — qna-agent-secret                                    ║
# ║  ⚠  DO NOT apply this file — use kubectl create secret instead.        ║
# ║     Real values must NEVER touch a file on disk.                        ║
# ║                                                                         ║
# ║  CREATE (safe):                                                         ║
# ║  kubectl create secret generic qna-agent-secret \                      ║
# ║    --from-literal=OPENAI_API_KEY=<your-real-value>                     ║
# ║                                                                         ║
# ║  VERIFY:                                                                ║
# ║  kubectl get secret qna-agent-secret -o yaml                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# WHY NOT YAML WITH REAL VALUES:
#   git history is permanent — deleting the file does not remove the value.
#   A private repo today can become a public leak tomorrow.
#
# NOTE — stringData vs data:
#   • `stringData` → write plain text; K8s base64-encodes internally.
#   • `data`       → you must base64-encode manually before writing.
#   base64 is ENCODING, not ENCRYPTION.  Anyone with kubectl access can
#   decode instantly:
#     kubectl get secret qna-agent-secret -o jsonpath='{.data.OPENAI_API_KEY}' | base64 -d
#   What actually protects a Secret is RBAC (who can kubectl get/describe).
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: qna-agent-secret         # ← CRITICAL: must match every secretRef / secretKeyRef
  namespace: default
  labels:
    app: qna-agent
    tier: backend
type: Opaque
stringData:
  OPENAI_API_KEY: "<REPLACE_ME — never commit a real value here>"

# ══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT SNIPPET — mount methods (copy one block into your Deployment YAML)
# ══════════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD A  —  env.valueFrom.secretKeyRef  ← USE THIS FOR TODAY         │
# │  Value becomes an environment variable.                                 │
# │  Visible via: kubectl exec <pod> -- env | grep OPENAI_API_KEY           │
# │  Use for: passwords, API keys, JWT secrets.                             │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: qna-agent
#         image: ttrungtin2910/qna-agent:day10
#         envFrom:
#           - configMapRef:
#               name: qna-agent-cm
#         env:
#           - name: OPENAI_API_KEY
#             valueFrom:
#               secretKeyRef:
#                 name: qna-agent-secret      # ← must equal metadata.name above
#                 key:  OPENAI_API_KEY
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD B  —  envFrom.secretRef  (inject ALL keys at once)              │
# │  Every key in the Secret becomes an env var.                            │
# │  Use when: all keys needed and no name collisions with ConfigMap keys.  │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: qna-agent
#         image: ttrungtin2910/qna-agent:day10
#         envFrom:
#           - configMapRef:
#               name: qna-agent-cm
#           - secretRef:
#               name: qna-agent-secret        # ← must equal metadata.name above
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD C  —  volumeMount (file in tmpfs — NOT visible in `env`)        │
# │  Secret mounted as a read-only file inside the container.               │
# │  Use for: TLS certs, multi-line PEM keys, kubeconfig files.             │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     volumes:
#       - name: openai-secret-vol
#         secret:
#           secretName: qna-agent-secret      # ← must equal metadata.name above
#     containers:
#       - name: qna-agent
#         image: ttrungtin2910/qna-agent:day10
#         volumeMounts:
#           - name: openai-secret-vol
#             mountPath: /run/secrets          # → file: /run/secrets/OPENAI_API_KEY
#             readOnly: true
#
# ──────────────────────────────────────────────────────────────────────────
