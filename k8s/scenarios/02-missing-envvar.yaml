# SCENARIO 2: Thiếu env var bắt buộc
#
# Triệu chứng: STATUS = CrashLoopBackOff
# Chẩn đoán:   kubectl logs crash-envvar -n web-lab --previous
# Tìm gì:      "FATAL: DB_URL is not set"
# Fix:         Thêm env var DB_URL vào spec.containers[].env
#
---
# Pod BỊ LỖI — thiếu DB_URL
apiVersion: v1
kind: Pod
metadata:
  name: crash-envvar
  namespace: web-lab
  labels:
    scenario: "02-missing-envvar"
spec:
  restartPolicy: Always
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
    - |
      echo "Booting web server..."
      if [ -z "$DB_URL" ]; then
        echo "FATAL: DB_URL is not set — cannot connect to database"
        exit 1
      fi
      echo "Connected to $DB_URL"
      sleep 3600
    resources:
      requests: { cpu: "50m", memory: "32Mi" }
      limits:   { cpu: "100m", memory: "64Mi" }

---
# Pod ĐÃ FIX — có DB_URL
apiVersion: v1
kind: Pod
metadata:
  name: crash-envvar-fixed
  namespace: web-lab
  labels:
    scenario: "02-missing-envvar-fixed"
spec:
  restartPolicy: Always
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
    - |
      echo "Booting web server..."
      if [ -z "$DB_URL" ]; then
        echo "FATAL: DB_URL is not set — cannot connect to database"
        exit 1
      fi
      echo "Connected to $DB_URL"
      sleep 3600
    env:
    - name: DB_URL
      value: "postgres://user:pass@postgres-svc:5432/mydb"
    resources:
      requests: { cpu: "50m", memory: "32Mi" }
      limits:   { cpu: "100m", memory: "64Mi" }
