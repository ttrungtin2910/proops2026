apiVersion: v1
kind: Secret
metadata:
  name: web-secrets
  namespace: web-lab
type: Opaque
# Giá trị phải encode base64: echo -n 'my-value' | base64
# s3cr3tPass123  → base64 = czNjcjN0UGFzczEyMw==
# postgres-host  → base64 = cG9zdGdyZXMtaG9zdA==
stringData:
  DB_PASSWORD: "s3cr3tPass123"
  DB_HOST: "postgres-svc.web-lab.svc.cluster.local"
