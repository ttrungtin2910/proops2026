---
# ClusterIP — truy cập nội bộ trong cluster
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: web-lab
spec:
  type: ClusterIP
  selector:
    app: web                          # khớp với label trên Pod từ Deployment
  ports:
  - name: http
    port: 80                          # port Service lắng nghe (nội bộ cluster)
    targetPort: 8080                  # port container đang lắng nghe

---
# NodePort — truy cập từ bên ngoài cluster qua node IP
apiVersion: v1
kind: Service
metadata:
  name: web-svc-nodeport
  namespace: web-lab
spec:
  type: NodePort
  selector:
    app: web
  ports:
  - name: http
    port: 80                          # nội bộ cluster
    targetPort: 8080                  # container port
    nodePort: 30080                   # port mở trên node — truy cập: <node-ip>:30080
                                      # bỏ dòng này → K8s tự cấp phát random (30000-32767)
