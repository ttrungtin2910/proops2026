# ============================================================
# K8s Secret — Redis AUTH password
# ============================================================
# QUAN TRỌNG: Đổi giá trị password trước khi apply.
#
# Cách tạo giá trị base64:
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-password"))
#   Kết quả của "dev-redis-password-2026": ZGV2LXJlZGlzLXBhc3N3b3JkLTIwMjY=
#
# File này KHÔNG commit lên git (đã có trong .gitignore).
# Dùng .env hoặc Vault trong production.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth-secret
  namespace: default
  labels:
    app: redis
    managed-by: helm-practice
type: Opaque
data:
  # base64("dev-redis-password-2026")
  redis-password: ZGV2LXJlZGlzLXBhc3N3b3JkLTIwMjY=

# ─────────────────────────────────────────────────────────────
# Để đổi password:
#   1. Chạy: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("password-mới"))
#   2. Thay giá trị redis-password bên trên
#   3. kubectl apply -f redis-auth-secret.yaml
#   4. kubectl rollout restart statefulset/my-redis-master
# ─────────────────────────────────────────────────────────────
