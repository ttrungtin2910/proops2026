# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Secret TEMPLATE — hook-gateway-secret                                 ║
# ║  ⚠  DO NOT apply this file — use kubectl create secret instead.        ║
# ║     Real values must NEVER touch a file on disk.                        ║
# ║                                                                         ║
# ║  CREATE (safe):                                                         ║
# ║  kubectl create secret generic hook-gateway-secret \                   ║
# ║    --from-literal=JWT_SECRET=<your-real-value>                         ║
# ║                                                                         ║
# ║  VERIFY:                                                                ║
# ║  kubectl get secret hook-gateway-secret -o yaml                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# WHY NOT YAML WITH REAL VALUES:
#   git history is permanent — deleting the file does not remove the value.
#   A private repo today can become a public leak tomorrow.
#
# NOTE — stringData vs data:
#   • `stringData` → write plain text; K8s base64-encodes internally.
#   • `data`       → you must base64-encode manually before writing.
#   base64 is ENCODING, not ENCRYPTION.  Anyone with kubectl access can
#   decode instantly:
#     kubectl get secret hook-gateway-secret -o jsonpath='{.data.JWT_SECRET}' | base64 -d
#   What actually protects a Secret is RBAC (who can kubectl get/describe).
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hook-gateway-secret      # ← CRITICAL: must match every secretRef / secretKeyRef
  namespace: default
  labels:
    app: hook-gateway
    tier: backend
type: Opaque
stringData:
  JWT_SECRET: "<REPLACE_ME — never commit a real value here>"

# ══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT SNIPPET — mount methods (copy one block into your Deployment YAML)
# ══════════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD A  —  env.valueFrom.secretKeyRef  ← USE THIS FOR TODAY         │
# │  Value becomes an environment variable.                                 │
# │  Visible via: kubectl exec <pod> -- env | grep JWT_SECRET               │
# │  Use for: passwords, API keys, JWT secrets.                             │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: hook-gateway
#         image: ttrungtin2910/hook-gateway:day10
#         envFrom:
#           - configMapRef:
#               name: hook-gateway-cm
#         env:
#           - name: JWT_SECRET
#             valueFrom:
#               secretKeyRef:
#                 name: hook-gateway-secret   # ← must equal metadata.name above
#                 key:  JWT_SECRET
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD B  —  envFrom.secretRef  (inject ALL keys at once)              │
# │  Every key in the Secret becomes an env var.                            │
# │  Use when: all keys needed and no name collisions with ConfigMap keys.  │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: hook-gateway
#         image: ttrungtin2910/hook-gateway:day10
#         envFrom:
#           - configMapRef:
#               name: hook-gateway-cm
#           - secretRef:
#               name: hook-gateway-secret     # ← must equal metadata.name above
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD C  —  volumeMount (file in tmpfs — NOT visible in `env`)        │
# │  Secret mounted as a read-only file inside the container.               │
# │  Use for: TLS certs, multi-line PEM keys, kubeconfig files.             │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     volumes:
#       - name: jwt-secret-vol
#         secret:
#           secretName: hook-gateway-secret   # ← must equal metadata.name above
#     containers:
#       - name: hook-gateway
#         image: ttrungtin2910/hook-gateway:day10
#         volumeMounts:
#           - name: jwt-secret-vol
#             mountPath: /run/secrets          # → file: /run/secrets/JWT_SECRET
#             readOnly: true
#
# ──────────────────────────────────────────────────────────────────────────
