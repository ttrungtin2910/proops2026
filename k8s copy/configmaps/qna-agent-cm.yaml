# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ConfigMap — qna-agent-cm                                              ║
# ║  kubectl apply  -f qna-agent-cm.yaml                                   ║
# ║  kubectl get configmap qna-agent-cm -o yaml                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# NOTE — stringData vs data:
#   • ConfigMap  → always uses `data`.  Values are plain strings already;
#                  no encoding step needed.  "stringData" does not exist here.
#   • Secret     → use `stringData` (K8s encodes to base64 internally).
#                  OPENAI_API_KEY lives in qna-agent-secret, not here.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: qna-agent-cm             # ← CRITICAL: must match every envFrom / valueFrom
  namespace: default
  labels:
    app: qna-agent
    tier: backend
data:
  # ── Kafka (K8s DNS: kafka.default.svc.cluster.local:9092) ─────────────────
  KAFKA_BOOTSTRAP_SERVERS:    "kafka:9092"
  KAFKA_TOPIC_QNA_INCOMING:   "dev.qna.incoming.msg"
  KAFKA_TOPIC_RESPONSE:       "dev.response.msg"

  # ── Milvus (K8s DNS: milvus.default.svc.cluster.local:19530) ──────────────
  MILVUS_HOST:                "milvus"
  MILVUS_PORT:                "19530"
  MILVUS_COLLECTION_NAME:     "public_service_docs"

  # ── Redis (K8s DNS: redis.default.svc.cluster.local:6379) ─────────────────
  REDIS_URL:                  "redis://redis:6379/0"

  # ── MongoDB (K8s DNS: mongodb.default.svc.cluster.local:27017) ────────────
  MONGODB_URI:                "mongodb://mongodb:27017"

  # ── OpenAI models (non-sensitive) ─────────────────────────────────────────
  OPENAI_CHAT_MODEL:          "gpt-4o-mini"
  OPENAI_EMBEDDING_MODEL:     "text-embedding-3-small"

  # ── Paths & runtime ───────────────────────────────────────────────────────
  KNOWLEDGE_BASE_PATH:        "/workspace/knowledge-base"
  RUNTIME_STATE_DIR:          "/workspace/.runtime"
  APP_ENV:                    "dev"

# ══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT SNIPPET — both methods side by side (copy one block into your
# Deployment YAML; delete the other)
# ══════════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD A  —  envFrom.configMapRef                                      │
# │  Injects ALL keys at once as env vars.                                  │
# │  Use when: every key is needed and naming is already consistent.        │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: qna-agent
#         image: ttrungtin2910/qna-agent:day10
#         ports:
#           - containerPort: 8000
#         envFrom:
#           - configMapRef:
#               name: qna-agent-cm        # ← must equal metadata.name above
#           - secretRef:
#               name: qna-agent-secret    # OPENAI_API_KEY lives here (not in CM)
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD B  —  env.valueFrom.configMapKeyRef                             │
# │  Pulls ONE key at a time; lets you rename it inside the container.      │
# │  Use when: pulling from multiple ConfigMaps or renaming a key.          │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: qna-agent
#         image: ttrungtin2910/qna-agent:day10
#         ports:
#           - containerPort: 8000
#         env:
#           - name: KAFKA_BOOTSTRAP_SERVERS
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  KAFKA_BOOTSTRAP_SERVERS
#           - name: KAFKA_TOPIC_QNA_INCOMING
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  KAFKA_TOPIC_QNA_INCOMING
#           - name: KAFKA_TOPIC_RESPONSE
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  KAFKA_TOPIC_RESPONSE
#           - name: MILVUS_HOST
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  MILVUS_HOST
#           - name: MILVUS_PORT
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  MILVUS_PORT
#           - name: MILVUS_COLLECTION_NAME
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  MILVUS_COLLECTION_NAME
#           - name: REDIS_URL
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  REDIS_URL
#           - name: MONGODB_URI
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  MONGODB_URI
#           - name: OPENAI_CHAT_MODEL
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  OPENAI_CHAT_MODEL
#           - name: OPENAI_EMBEDDING_MODEL
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  OPENAI_EMBEDDING_MODEL
#           - name: KNOWLEDGE_BASE_PATH
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  KNOWLEDGE_BASE_PATH
#           - name: RUNTIME_STATE_DIR
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  RUNTIME_STATE_DIR
#           - name: APP_ENV
#             valueFrom:
#               configMapKeyRef:
#                 name: qna-agent-cm
#                 key:  APP_ENV
#           - name: OPENAI_API_KEY             # pulled from Secret, not CM
#             valueFrom:
#               secretKeyRef:
#                 name: qna-agent-secret
#                 key:  OPENAI_API_KEY
#
# ══════════════════════════════════════════════════════════════════════════════
# CRITICAL — what happens when metadata.name does NOT match configMapRef.name
# ══════════════════════════════════════════════════════════════════════════════
#
#  Bad Deployment fragment:
#    envFrom:
#      - configMapRef:
#          name: qna-agnt-cm     # ← typo: "agnt" instead of "agent"
#
#  Pod will stay in Pending.  kubectl describe pod qna-agent-xxx shows:
#
#    Events:
#      Type     Reason   Age  From     Message
#      -------  ------   ---  ----     -------
#      Warning  Failed   5s   kubelet  Error: configmap "qna-agnt-cm" not found
#
#  Fix: correct the name in the Deployment and re-apply, OR rename the
#  ConfigMap to match (kubectl delete + re-apply; ConfigMaps are immutable
#  in-place for the name field).
# ──────────────────────────────────────────────────────────────────────────
