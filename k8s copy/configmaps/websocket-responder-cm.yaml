# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ConfigMap — websocket-responder-cm                                    ║
# ║  kubectl apply  -f websocket-responder-cm.yaml                         ║
# ║  kubectl get configmap websocket-responder-cm -o yaml                  ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# NOTE — stringData vs data:
#   • ConfigMap  → always uses `data`.  Values are plain strings already;
#                  no encoding step needed.  "stringData" does not exist here.
#   • Secret     → use `stringData` (K8s encodes to base64 internally).
#                  JWT_SECRET lives in websocket-responder-secret, not here.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-responder-cm   # ← CRITICAL: must match every envFrom / valueFrom
  namespace: default
  labels:
    app: websocket-responder
    tier: backend
data:
  # ── Kafka (K8s DNS: kafka.default.svc.cluster.local:9092) ─────────────────
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_TOPIC_RESPONSE:    "dev.response.msg"

  # ── Runtime ────────────────────────────────────────────────────────────────
  APP_ENV:                 "dev"

# ══════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT SNIPPET — both methods side by side (copy one block into your
# Deployment YAML; delete the other)
# ══════════════════════════════════════════════════════════════════════════════
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD A  —  envFrom.configMapRef                                      │
# │  Injects ALL keys at once as env vars.                                  │
# │  Use when: every key is needed and naming is already consistent.        │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: websocket-responder
#         image: ttrungtin2910/websocket-responder:day10
#         ports:
#           - containerPort: 8085
#         envFrom:
#           - configMapRef:
#               name: websocket-responder-cm      # ← must equal metadata.name above
#           - secretRef:
#               name: websocket-responder-secret  # JWT_SECRET lives here (not in CM)
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  METHOD B  —  env.valueFrom.configMapKeyRef                             │
# │  Pulls ONE key at a time; lets you rename it inside the container.      │
# │  Use when: pulling from multiple ConfigMaps or renaming a key.          │
# └─────────────────────────────────────────────────────────────────────────┘
#
#   spec:
#     containers:
#       - name: websocket-responder
#         image: ttrungtin2910/websocket-responder:day10
#         ports:
#           - containerPort: 8085
#         env:
#           - name: KAFKA_BOOTSTRAP_SERVERS
#             valueFrom:
#               configMapKeyRef:
#                 name: websocket-responder-cm     # ConfigMap to read from
#                 key:  KAFKA_BOOTSTRAP_SERVERS    # key inside that ConfigMap
#           - name: KAFKA_TOPIC_RESPONSE
#             valueFrom:
#               configMapKeyRef:
#                 name: websocket-responder-cm
#                 key:  KAFKA_TOPIC_RESPONSE
#           - name: APP_ENV
#             valueFrom:
#               configMapKeyRef:
#                 name: websocket-responder-cm
#                 key:  APP_ENV
#           - name: JWT_SECRET                    # pulled from Secret, not CM
#             valueFrom:
#               secretKeyRef:
#                 name: websocket-responder-secret
#                 key:  JWT_SECRET
#
# ══════════════════════════════════════════════════════════════════════════════
# CRITICAL — what happens when metadata.name does NOT match configMapRef.name
# ══════════════════════════════════════════════════════════════════════════════
#
#  Bad Deployment fragment:
#    envFrom:
#      - configMapRef:
#          name: websocket-respndr-cm   # ← typo: "respndr" instead of "responder"
#
#  Pod will stay in Pending.  kubectl describe pod websocket-responder-xxx shows:
#
#    Events:
#      Type     Reason   Age  From     Message
#      -------  ------   ---  ----     -------
#      Warning  Failed   5s   kubelet  Error: configmap "websocket-respndr-cm" not found
#
#  Fix: correct the name in the Deployment and re-apply, OR rename the
#  ConfigMap to match (kubectl delete + re-apply; ConfigMaps are immutable
#  in-place for the name field).
# ──────────────────────────────────────────────────────────────────────────
